# Customer u002 -- premium tier
# Chapter 19: Jails in Production

www-nginx-u002 {
    exec.created += \
        "rctl -a jail:$name:memoryuse:deny=2G";
    exec.created += \
        "rctl -a jail:$name:pcpu:deny=200";
}

data-postgres-u002 {
    exec.created += \
        "rctl -a jail:$name:memoryuse:deny=4G";
    exec.created += \
        "rctl -a jail:$name:pcpu:deny=200";
}
