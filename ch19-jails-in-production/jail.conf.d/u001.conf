# Customer u001 -- basic tier
# Chapter 19: Jails in Production

www-nginx-u001 {
    exec.created += \
        "rctl -a jail:$name:memoryuse:deny=512M";
    exec.created += \
        "rctl -a jail:$name:pcpu:deny=50";
}

data-postgres-u001 {
    exec.created += \
        "rctl -a jail:$name:memoryuse:deny=1G";
    exec.created += \
        "rctl -a jail:$name:pcpu:deny=50";
}
