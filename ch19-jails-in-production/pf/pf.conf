# /etc/pf.conf -- production rules
# Chapter 19: Jails in Production

# Interfaces
ext_if = "em0"

# Tables
table <bruteforce> persist

# Options
set skip on lo0
set block-policy drop

# Normalisation
scrub in all

# Default: deny everything
block all

# Loopback: allow
pass on lo0

# Outbound: allow from host
pass out on $ext_if proto { tcp udp } \
    from ($ext_if) keep state

# SSH: allow with brute-force protection
pass in on $ext_if proto tcp to ($ext_if) \
    port 22 keep state \
    (max-src-conn 5, max-src-conn-rate 3/30, \
     overload <bruteforce> flush global)

# HTTP/HTTPS: allow to proxy jail only
pass in on $ext_if proto tcp \
    to 10.0.2.16 port { 80 443 } keep state

# Block brute-force offenders
block in quick on $ext_if \
    from <bruteforce>
