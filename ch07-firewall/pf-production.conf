# /etc/pf.conf -- worf's production server
# Chapter 7: The Firewall That Fits on One Page

ext_if = "vtnet0"
int_if = "lo1"
tcp_services = "{ http, https }"
int_services = "{ postgresql }"
monitoring_net = "10.0.1.0/24"

table <bruteforce> persist

set skip on lo0
scrub in all

block in all
pass out all keep state

# Public services
pass in on $ext_if proto tcp \
    to port $tcp_services

# SSH with rate limiting
pass in on $ext_if proto tcp to port ssh \
    flags S/SA keep state \
    (max-src-conn-rate 3/30, \
    overload <bruteforce> flush global)
block in quick on $ext_if from <bruteforce>

# Internal services (jail-to-jail)
pass in on $int_if proto tcp \
    to port $int_services

# Monitoring
pass in on $ext_if proto udp \
    from $monitoring_net to port snmp

# ICMP
pass in on $ext_if proto icmp
