# /etc/jail.conf -- three-jail web stack
# Chapter 18: A Web Stack Without Complexity

# Global defaults
exec.start = "/bin/sh /etc/rc";
exec.stop = "/bin/sh /etc/rc.shutdown";
exec.clean;
mount.devfs;

# Reverse proxy -- the only jail with network access
proxy-caddy {
    host.hostname = "proxy-caddy";
    path = "/zroot/jails/proxy-caddy";
    ip4.addr = 10.0.2.16;
    ip6 = disable;
    persist;
    mount.fstab = "/etc/fstab.proxy-caddy";
}

# Web tier -- blind, no network
www-nginx-u001 {
    host.hostname = "www-nginx-u001";
    path = "/zroot/jails/www-nginx-u001";
    ip4 = disable;
    ip6 = disable;
    persist;
    mount.fstab = "/etc/fstab.www-nginx-u001";
}

# Data tier -- blind, no network
data-postgres-u001 {
    host.hostname = "data-postgres-u001";
    path = "/zroot/jails/data-postgres-u001";
    ip4 = disable;
    ip6 = disable;
    persist;
    sysvshm = new;
    sysvsem = new;
    sysvmsg = new;
    mount.fstab = "/etc/fstab.data-postgres-u001";
}
